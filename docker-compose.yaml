version: "3.9"

services:

  proxy:
    image: mitmproxy/mitmproxy

    container_name: delaylama-cache-proxy

    command: >
      mitmdump
      --listen-host 0.0.0.0
      --listen-port 3128
      -s /addons/mitm_addon.py
      --ssl-insecure

    ports:
      - "3128:3128"

    environment:
      CACHED_DELAY_MS: 5000
      CACHE_DB: /data/cache.db

    volumes:
      - ./proxy/mitm_addon.py:/addons/mitm_addon.py
      - ./proxy/data:/data
      - mitm_certs:/home/mitmproxy/.mitmproxy

    restart: unless-stopped

    networks:
      - backend


  app:
    build:
      context: ./app

    depends_on:
      - proxy

    ports:
      - "8080:8080"

    environment:
      HTTP_PROXY: http://proxy:3128
      HTTPS_PROXY: http://proxy:3128

      JAVA_TOOL_OPTIONS: >
        -Dhttp.proxyHost=proxy
        -Dhttp.proxyPort=3128
        -Dhttps.proxyHost=proxy
        -Dhttps.proxyPort=3128
        -Djavax.net.ssl.trustStore=/tmp/cacerts
        -Djavax.net.ssl.trustStorePassword=changeit

    volumes:
      - mitm_certs:/mitm-certs:ro
      - ./app/docker-entrypoint.sh:/docker-entrypoint.sh:ro

    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]

    networks:
      - backend

  gatling:
    image: gerritforge/gatling:3.9.5
    container_name: gatling
    working_dir: /opt/gatling
    volumes:
      # Scala simulations
      - ./gatling/scripts:/opt/gatling/user-files/simulations:z

      # Optional: custom resources (CSV feeders, etc.)
      - ./gatling/resources:/opt/gatling/user-files/resources:z

      # Results output
      - ./gatling/results:/opt/gatling/results:z

      #- ./gatling/conf/gatling.conf:/opt/gatling/conf/gatling.conf:ro
    
    entrypoint:
      - sleep

    command: 
      - infinity

    networks:
      - backend    

  # gatling:
  #   build:
  #     context: ./gatling
  #   container_name: gatling
  #   working_dir: /opt/gatling
  #   volumes:
  #     # Mount your scripts folder to the Maven Scala test source directory
  #     - ./gatling/scripts:/opt/gatling/src/test/scala:z

  #     # If you have resource files (CSV, JSON feeders, etc.)
  #     - ./gatling/resources:/opt/gatling/src/test/resources:z

  #     # Results output (Maven plugin writes to target/gatling)
  #     - ./gatling/results:/opt/gatling/target/gatling:z

  #   entrypoint: sleep
  #   command: infinity
  #   networks:
  #     - backend

networks:
  backend:

volumes:
  mitm_certs: